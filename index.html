<!doctype html>
<html lang="de" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Pollo Loco</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="./assets/img/6_salsa_bottle/salsa_bottle.png"
      type="image/x-icon" />

    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/movable-object.class.js"></script>
    <script src="./models/collectibles.class.js"></script>
    <script src="./models/bottle-collectible.class.js"></script>
    <script src="./models/coin-collectible.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/babychicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/background-object.class.js"></script>
    <script src="./models/endboss.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/status-bar-bottle.class.js"></script>
    <script src="./models/status-bar-coins.class.js"></script>
    <script src="./models/status-bar-endboss.class.js"></script>
    <script src="./models/damage-text.class.js"></script>
    <script src="./script/utilities.js"></script>
    <script src="./models/world.class.js"></script>
    <script src="./script/level-builder.js"></script>
    <script src="./levels/level1.js"></script>
    <script src="./levels/level2.js"></script>
    <script src="./levels/level3.js"></script>
    <script src="./script/game.js"></script>
  </head>
  <body>
    <h1>El Pollo Loco!</h1>
    <div class="game-container">
      <div id="startScreen" class="screen-overlay">
        <img
          src="assets/img/9_intro_outro_screens/start/startscreen_3.png"
          class="start-bg" />
        <button
          class="start-btn"
          style="left: 4.8%; top: 72%; width: 19.3%; height: 22.1%;"
          onclick="startGame(createLevel1)">
          Game Start
        </button>
        <button
          class="start-btn"
          style="left: 28.5%; top: 72%; width: 19.3%; height: 22.1%;"
          onclick="openPanel('levelSelectPanel')">
          Level Select
        </button>
        <button
          class="start-btn"
          style="left: 52.1%; top: 72%; width: 19.3%; height: 22.1%;"
          onclick="openPanel('controlsPanel')">
          Controls
        </button>
        <button
          class="start-btn"
          style="left: 75.7%; top: 72%; width: 19.3%; height: 22.1%;"
          onclick="openPanel('imprintPanel')">
          Imprint
        </button>
      </div>

      <div
        id="controlsPanel"
        class="screen-overlay panel"
        style="display: none;">
        <h2>Controls</h2>
        <div class="control-row">
          <div class="key-group">
            <span class="key">←</span>
            <span class="key">→</span>
          </div>
          <span class="control-label">Move your Pepe!</span>
        </div>
        <div class="control-row">
          <div class="key-group">
            <span class="key key-wide">Space</span>
          </div>
          <span class="control-label">Let Pepe jump high!</span>
        </div>
        <div class="control-row">
          <div class="key-group">
            <span class="key">D</span>
          </div>
          <span class="control-label">Throw bottle with Pepe!</span>
        </div>
        <div class="back-row">
          <button class="wood-btn" onclick="closePanel('controlsPanel')">
            Back
          </button>
        </div>
      </div>

      <div
        id="levelSelectPanel"
        class="screen-overlay panel"
        style="display: none;">
        <h2>Choose Level</h2>
        <div class="button-row">
          <button class="wood-btn" onclick="startGame(createLevel1)">
            Level 1
          </button>
          <button class="wood-btn" onclick="startGame(createLevel2)">
            Level 2
          </button>
          <button class="wood-btn" onclick="startGame(createLevel3)">
            Level 3
          </button>
        </div>
        <div class="back-row">
          <button class="wood-btn" onclick="closePanel('levelSelectPanel')">
            Back
          </button>
        </div>
      </div>

      <div
        id="imprintPanel"
        class="screen-overlay panel"
        style="display: none;">
        <h2>Impressum</h2>
        <p>Mathias Mayer</p>
        <p>Martinshöhe 24A, 04158 Leipzig</p>
        <p>
          E-Mail:
          <a href="mailto:mayer.mathias@proton.me">mayer.mathias@proton.me</a>
        </p>
        <div class="back-row">
          <button class="wood-btn" onclick="closePanel('imprintPanel')">
            Back
          </button>
        </div>
      </div>

      <div id="rotateHint" class="rotate-hint">
        <video class="rotate-video" autoplay loop muted playsinline>
          <source src="./assets/video/271763.mp4" type="video/mp4" />
        </video>
      </div>

      <canvas
        id="canvas"
        width="720px"
        height="480px"
        style="display: none;"
        tabindex="0">
      </canvas>

      <div id="touchControls">
        <div class="touch-left">
          <button class="touch-btn" id="btn-left">◀</button>
          <button class="touch-btn" id="btn-right">▶</button>
        </div>
        <div class="touch-right">
          <button class="touch-btn" id="btn-jump">
            <img src="./assets/icons/jump.png" alt="Jump" />
          </button>
          <button class="touch-btn" id="btn-throw">
            <img src="./assets/icons/throw.png" alt="Throw" />
          </button>
        </div>
      </div>

      <div id="gameControls" style="display: none;">
        <button id="homeButton" class="game-icon-btn" onclick="goToMainMenu()">
          <img src="./assets/icons/home.png" alt="Home" />
        </button>
        <button
          id="fullscreenButton"
          class="game-icon-btn"
          onclick="toggleFullscreen()">
          <img src="./assets/icons/expand.png" alt="Fullscreen" />
        </button>
      </div>

      <div
        id="endScreenButtons"
        class="end-screen-buttons"
        style="display: none;">
        <button id="restartButton" class="wood-btn" onclick="restartGame()">
          Restart
        </button>
        <button id="mainMenuButton" class="wood-btn" onclick="goToMainMenu()">
          Main Menu
        </button>
        <button
          id="nextLevelButton"
          class="wood-btn"
          style="display: none;"
          onclick="loadNextLevel()">
          Next Level
        </button>
      </div>
    </div>
  </body>
</html>
